spring:
  profiles:
    active: test
  
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  h2:
    console:
      enabled: true

  liquibase:
    enabled: false

  security:
    user:
      name: testuser
      password: testpass
      roles: ADMIN

logging:
  level:
    com.salwita.taskmanagement: DEBUG
    org.springframework.test: DEBUG
    org.springframework.security: DEBUG