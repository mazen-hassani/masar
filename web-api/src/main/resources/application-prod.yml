spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/taskmanagement}
    username: ${DATABASE_USERNAME:taskmanagement}
    password: ${DATABASE_PASSWORD:taskmanagement}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    show-sql: false

  liquibase:
    contexts: prod

logging:
  level:
    com.salwita.taskmanagement: INFO
    org.springframework.security: WARN
    org.springframework.web: WARN
  file:
    name: logs/task-management.log

management:
  endpoints:
    web:
      exposure:
        include: health,info